<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Developers</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    min-height:100%;
    overflow-x:hidden;
}

body{
    font-family:'Orbitron', sans-serif;
    background: radial-gradient(circle at top, #3c7ea8 0%, #125179 28%, #072145 60%, #02080f 100%);
    color:#e7f9ff;
    overflow:hidden;
    cursor:none;
    position:relative;
    -webkit-font-smoothing:antialiased;
    touch-action:manipulation;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background: linear-gradient(180deg, rgba(235,255,255,0.08), transparent 14%),
               radial-gradient(circle at 50% 5%, rgba(255,255,255,0.18), transparent 18%);
    pointer-events:none;
    z-index:0;
}

body::after{
    content:"";
    position:fixed;
    inset:0;
    background-image:radial-gradient(circle at 14% 18%, rgba(255,255,255,0.14), transparent 16%),
                      radial-gradient(circle at 82% 22%, rgba(255,255,255,0.08), transparent 14%),
                      linear-gradient(180deg, transparent 0%, rgba(0,18,46,0.22) 36%, rgba(0,8,18,0.7) 100%);
    opacity:0.34;
    pointer-events:none;
    z-index:1;
}

.ocean-elements{
    position:fixed;
    inset:0;
    pointer-events:none;
    z-index:1;
    overflow:hidden;
}

.ocean-elements::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:radial-gradient(circle at 25% 12%, rgba(255,255,255,0.12), transparent 15%),
                      radial-gradient(circle at 70% 10%, rgba(255,255,255,0.08), transparent 14%),
                      linear-gradient(180deg, rgba(255,255,255,0.04), transparent 28%);
    opacity:0.36;
    pointer-events:none;
}

.fish{
    position:absolute;
    width:110px;
    height:52px;
    border-radius:50% 50% 40% 40%;
    background:linear-gradient(135deg, #bbe8ff 0%, #60b6de 45%, #0b3f68 100%);
    filter:drop-shadow(0 0 14px rgba(0,160,240,0.16));
    transform-origin:center;
}

.fish::before{
    content:"";
    position:absolute;
    width:24px;
    height:28px;
    background:linear-gradient(135deg, #0e5483, #8cd9ff);
    border-radius:50% 20% 50% 20%;
    right:-20px;
    top:50%;
    transform:translateY(-50%) rotate(15deg);
}

.fish::after{
    content:"";
    position:absolute;
    width:10px;
    height:10px;
    border-radius:50%;
    background:rgba(255,255,255,0.9);
    right:22%;
    top:26%;
    box-shadow:0 0 8px rgba(255,255,255,0.45);
}

.fish1{ top:22%; left:-18%; animation:swimRight 22s linear infinite; }
.fish2{ top:54%; left:110%; animation:swimLeft 26s linear infinite; transform:scale(0.82) rotateY(180deg); }
.fish3{ top:38%; left:-20%; animation:swimRight 18s ease-in-out infinite; transform:scale(0.75); }

@keyframes swimRight{
    0%{transform:translateX(0) scale(1);}
    50%{transform:translateX(140vw) scale(1.05);}
    100%{transform:translateX(0) scale(1);}
}

@keyframes swimLeft{
    0%{transform:translateX(0) scale(0.82) rotateY(180deg);}
    50%{transform:translateX(-142vw) scale(0.88) rotateY(180deg);}
    100%{transform:translateX(0) scale(0.82) rotateY(180deg);}
}

.seaweed{
    position:absolute;
    bottom:0;
    width:16px;
    background:linear-gradient(180deg, #0c4d6e 0%, #063b5a 100%);
    border-radius:18px;
    filter:drop-shadow(0 0 12px rgba(0,120,175,0.18));
    animation:sway 4s ease-in-out infinite alternate;
}

.seaweed::before{
    content:"";
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    width:24px;
    height:30px;
    background:linear-gradient(180deg, rgba(140,230,255,0.9), rgba(20,140,190,0.44));
    border-radius:50%;
    bottom:90%;
}

.sw1{ left:6%; height:150px; animation-delay:0s; }
.sw2{ left:14%; height:170px; animation-delay:0.3s; }
.sw3{ right:14%; height:135px; animation-delay:0.2s; }
.sw4{ right:6%; height:152px; animation-delay:0.4s; }

@keyframes sway{
    0%{transform:translateX(0) skewX(0deg);}
    100%{transform:translateX(10px) skewX(6deg);}
}

.bubble{
    position:absolute;
    bottom:16%;
    width:12px;
    height:12px;
    border-radius:50%;
    border:1px solid rgba(255,255,255,0.75);
    background:rgba(255,255,255,0.12);
    box-shadow:0 0 8px rgba(255,255,255,0.28);
    animation:bubbleUp 10s linear infinite;
}

.b1{ left:18%; animation-delay:0s; }
.b2{ left:52%; animation-delay:2.4s; width:14px; height:14px; }
.b3{ left:78%; animation-delay:1.1s; width:10px; height:10px; }
.b4{ left:40%; animation-delay:4.9s; width:16px; height:16px; }

@keyframes bubbleUp{
    0%{opacity:0; transform:translateY(0) scale(0.55);}
    10%{opacity:1;}
    100%{opacity:0; transform:translateY(-130vh) scale(1.2);}
}

.coral{
    position:absolute;
    bottom:0;
    width:24px;
    height:56px;
    background:linear-gradient(180deg, #ffa6b7 0%, #e76c93 100%);
    border-radius:18px 18px 24px 24px;
    filter:drop-shadow(0 0 10px rgba(255,145,160,0.18));
}

.coral::before{
    content:"";
    position:absolute;
    left:50%;
    bottom:72%;
    width:18px;
    height:20px;
    background:linear-gradient(180deg, #ffdadf 0%, #e26a87 100%);
    border-radius:999px;
    transform:translateX(-50%);
}

.c1{ left:10%; }
.c2{ right:10%; height:48px; }

.site-logo{
    position:fixed;
    top:14px;
    left:14px;
    z-index:10000;
    display:inline-block;
    text-decoration:none;
}

.site-logo img{
    width:84px;
    height:auto;
    object-fit:contain;
    background:rgba(255,255,255,0.06);
    border-radius:12px;
    filter:drop-shadow(0 0 12px rgba(0,180,255,0.35));
    transition:0.3s ease;
}

.site-logo img:hover{
    transform:scale(1.05);
    filter:drop-shadow(0 0 18px rgba(0,220,255,0.45));
}

.cursor{
    position:fixed;
    width:14px;
    height:14px;
    border-radius:50%;
    background:rgba(180,255,255,0.95);
    box-shadow:0 0 12px rgba(180,255,255,0.9), 0 0 25px rgba(0,175,255,0.35);
    pointer-events:none;
    transform:translate(-50%,-50%);
    z-index:99999;
}

.cursor-ring{
    position:fixed;
    width:42px;
    height:42px;
    border:2px solid rgba(160,235,255,0.35);
    border-radius:50%;
    pointer-events:none;
    transform:translate(-50%,-50%);
    z-index:99998;
    transition:0.08s ease;
}

.spark{
    position:fixed;
    width:8px;
    height:8px;
    border-radius:50%;
    background:rgba(190,250,255,0.9);
    pointer-events:none;
    z-index:99997;
    box-shadow:0 0 12px rgba(190,250,255,0.9), 0 0 24px rgba(0,190,255,0.35);
    animation:sparkFly 0.8s linear forwards;
}

@keyframes sparkFly{
    0%{opacity:1; transform:scale(1);}
    100%{opacity:0; transform:translateY(-28px) scale(0.2);}
}

.cursor.hover{
    transform:translate(-50%,-50%) scale(1.6);
    background:rgba(255,255,255,0.95);
}

.cursor-ring.hover{
    transform:translate(-50%,-50%) scale(1.3);
    border-color:rgba(160,235,255,0.75);
}

#intro{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    overflow:hidden;
    background:linear-gradient(180deg, rgba(14,56,99,0.96) 0%, rgba(7,28,54,0.98) 62%, #02070e 100%);
    padding:120px 20px 40px;
    z-index:2;
}

#intro::before{
    content:"";
    position:absolute;
    inset:-20%;
    background:radial-gradient(circle at 50% -10%, rgba(255,255,255,0.18), transparent 35%);
    opacity:0.42;
    animation:driftLight 16s ease-in-out infinite;
}

#intro::after{
    content:"";
    position:absolute;
    inset:0;
    background-image:linear-gradient(180deg, rgba(255,255,255,0.06), transparent 12%),
                      radial-gradient(circle at 35% 5%, rgba(255,255,255,0.08), transparent 12%);
    pointer-events:none;
    z-index:2;
}

@keyframes driftLight{
    0%{transform:translate(-18%,0);}
    50%{transform:translate(18%,2%);}
    100%{transform:translate(-18%,0);}
}

.tile{
    position:absolute;
    width:120px;
    height:120px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(170,240,255,0.22);
    border-radius:50%;
    overflow:hidden;
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    box-shadow:0 0 24px rgba(0,160,255,0.15);
    animation:float 8s ease-in-out infinite;
}

.tile::before{
    content:"";
    position:absolute;
    inset:12%;
    background:radial-gradient(circle at 35% 35%, rgba(255,255,255,0.96), transparent 45%),
                radial-gradient(circle at 65% 65%, rgba(200,255,255,0.55), transparent 40%);
    opacity:0.95;
    border-radius:50%;
}

.tile::after{
    content:"";
    position:absolute;
    inset:0;
    background-image:radial-gradient(circle at 18% 18%, rgba(255,255,255,0.12), transparent 16%),
                      radial-gradient(circle at 72% 28%, rgba(255,255,255,0.08), transparent 14%);
}

@keyframes float{
    0%{transform:translate3d(0,0,0) rotate(0deg);}
    50%{transform:translate3d(0,-18px,0) rotate(5deg);}
    100%{transform:translate3d(0,0,0) rotate(0deg);}
}

.t1{top:12%; left:14%; width:110px; height:110px;}
.t2{top:18%; right:12%; width:100px; height:100px;}
.t3{bottom:14%; left:11%; width:98px; height:98px;}
.t4{bottom:20%; right:20%; width:108px; height:108px;}
.t5{top:50%; left:6%; width:92px; height:92px;}
.t6{top:62%; right:6%; width:84px; height:84px;}

#sub{
    color:#c5efff;
    font-size:clamp(0.85rem, 2.8vw, 1.1rem);
    letter-spacing:clamp(1px, 0.5vw, 3px);
    margin-bottom:22px;
    opacity:0;
    animation:fadeIn 1s ease forwards;
    z-index:2;
    text-align:center;
    text-shadow:0 0 12px rgba(36,222,255,0.2);
}

@keyframes fadeIn{
    to{opacity:1;}
}

#title{
    display:flex;
    gap:8px;
    perspective:900px;
    z-index:2;
    flex-wrap:nowrap;
    justify-content:center;
    align-items:center;
    max-width:100%;
    text-align:center;
    white-space:nowrap;
    position:relative;
    padding:14px 18px;
    border-radius:24px;
    background:rgba(4,24,48,0.55);
    border:1px solid rgba(108,214,255,0.18);
    box-shadow:0 0 30px rgba(10,120,180,0.15);
}

#title::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(135deg, rgba(56,190,255,0.14), rgba(19,81,144,0.16));
    border-radius:24px;
    z-index:-1;
}

.letter{
    font-size:clamp(1.35rem, 5vw, 3.8rem);
    color:#e8fcff;
    opacity:0;
    transform:translateY(60px) rotateX(-90deg);
    animation:drop3D 0.85s ease forwards;
    text-shadow:0 0 20px rgba(0,215,255,0.35), 0 0 40px rgba(0,125,200,0.22);
    position:relative;
    z-index:1;
}

@keyframes drop3D{
    0%{opacity:0; transform:translateY(60px) rotateX(-90deg);}
    60%{opacity:1; transform:translateY(-10px) rotateX(12deg);}
    100%{opacity:1; transform:translateY(0) rotateX(0deg);}
}

#visitBtn{
    margin-top:34px;
    padding:14px 30px;
    font-size:clamp(0.9rem, 2.8vw, 1rem);
    letter-spacing:2px;
    color:#d9f8ff;
    background:rgba(15,85,145,0.8);
    border:1px solid rgba(160,225,255,0.4);
    border-radius:14px;
    cursor:pointer;
    backdrop-filter:blur(8px);
    box-shadow:0 0 18px rgba(0,150,255,0.25), inset 0 0 14px rgba(255,255,255,0.08);
    transition:0.25s ease;
    z-index:3;
    position:relative;
}

#visitBtn:hover{
    transform:scale(1.05);
    color:#ffffff;
    background:rgba(30,130,205,0.95);
    box-shadow:0 0 24px rgba(0,190,255,0.35), 0 0 36px rgba(16,113,186,0.2);
}

@media (max-width: 768px){
    body{ cursor:auto; }
    .cursor, .cursor-ring, .spark{ display:none; }
    .site-logo img{ width:62px; }
    #intro{ padding:100px 16px 30px; }
    .tile{ width:90px; height:90px; border-radius:50%; }
    .t1{top:8%; left:6%; width:80px; height:80px;}
    .t2{top:14%; right:6%; width:70px; height:70px;}
    .t3{bottom:10%; left:6%; width:72px; height:72px;}
    .t4{bottom:14%; right:6%; width:82px; height:82px;}
    .t5{top:52%; left:2%; width:68px; height:68px;}
    .t6{top:58%; right:2%; width:64px; height:64px;}
    #title{ gap:5px; padding:9px 12px; }
    .letter{ font-size:clamp(1.1rem, 4.6vw, 2.4rem); }
    #visitBtn{ margin-top:28px; padding:12px 24px; }
}

@media (max-width: 480px){
    .site-logo{ top:8px; left:8px; }
    .site-logo img{ width:52px; }
    #intro{ padding:88px 12px 26px; }
    .tile{ width:72px; height:72px; border-radius:50%; opacity:0.9; }
    #title{ gap:3px; padding:7px 10px; }
    .letter{ font-size:clamp(0.95rem, 4vw, 1.7rem); }
    #sub{ margin-bottom:14px; }
    #visitBtn{ padding:10px 18px; letter-spacing:1px; }
}
</style>
</head>

<body>

<a href="#" class="site-logo">
    <img src="logo.png" alt="Aura Developers Logo">
</a>

<div class="cursor"></div>
<div class="cursor-ring"></div>
<div class="ocean-elements">
    <div class="fish fish1"></div>
    <div class="fish fish2"></div>
    <div class="fish fish3"></div>
    <div class="bubble b1"></div>
    <div class="bubble b2"></div>
    <div class="bubble b3"></div>
    <div class="bubble b4"></div>
    <div class="seaweed sw1"></div>
    <div class="seaweed sw2"></div>
    <div class="seaweed sw3"></div>
    <div class="seaweed sw4"></div>
    <div class="coral c1"></div>
    <div class="coral c2"></div>
</div>

<div id="intro">
    <div class="tile t1"></div>
    <div class="tile t2"></div>
    <div class="tile t3"></div>
    <div class="tile t4"></div>
    <div class="tile t5"></div>
    <div class="tile t6"></div>

    <div id="sub">LET'S EXPLORE TOGETHER</div>
    <div id="title"></div>

    <button id="visitBtn" onclick="goVisit()">VISIT SITE</button>
</div>

<script>
const text = "AURA DEVELOPER";
const title = document.getElementById("title");
let i = 0;

function build(){
    if(i < text.length){
        const span = document.createElement("span");
        span.className = "letter";
        span.textContent = text[i];
        title.appendChild(span);
        i++;
        setTimeout(build, 90);
    }
}

window.addEventListener("load", build);

function goVisit(){
    window.location.href = "home.html";
}

const cursor = document.querySelector(".cursor");
const ring = document.querySelector(".cursor-ring");
const isTouch = window.matchMedia("(max-width: 768px), (pointer: coarse)").matches;

if(!isTouch){
    document.addEventListener("mousemove",(e)=>{
        const x = e.clientX;
        const y = e.clientY;
        cursor.style.left = x + "px";
        cursor.style.top = y + "px";
        ring.style.left = x + "px";
        ring.style.top = y + "px";
        const spark = document.createElement("div");
        spark.className = "spark";
        spark.style.left = x + "px";
        spark.style.top = y + "px";
        document.body.appendChild(spark);
        setTimeout(()=> spark.remove(), 800);
    });

    document.getElementById("visitBtn").addEventListener("mouseenter", () => {
        cursor.classList.add("hover");
        ring.classList.add("hover");
    });

    document.getElementById("visitBtn").addEventListener("mouseleave", () => {
        cursor.classList.remove("hover");
        ring.classList.remove("hover");
    });
}
</script>

</body>
</html>

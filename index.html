
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Aura Developers</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
  --deep-0:#04101a;
  --deep-1:#06253a;
  --deep-2:#0a4e73;
  --deep-3:#1090c8;
  --deep-4:#25d6ff;
  --glow:#d6fbff;
  --aqua:#7ff6ff;
  --glass:rgba(10,40,64,0.42);
  --glass-2:rgba(10,54,84,0.58);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  overflow:hidden;
  scroll-behavior:smooth;
}

body{
  font-family:'Orbitron',sans-serif;
  color:#f4fdff;
  cursor:none;
  -webkit-font-smoothing:antialiased;
  position:relative;
  background:
    radial-gradient(circle at 50% 0%, rgba(255,255,255,0.34) 0%, rgba(90,235,255,0.18) 14%, rgba(17,148,205,0.18) 28%, rgba(5,48,82,0.52) 52%, rgba(3,12,18,0.96) 100%),
    linear-gradient(180deg, #79efff 0%, #25bdf0 16%, #117cb5 36%, #073a66 64%, #041019 100%);
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 50% 5%, rgba(255,255,255,0.48), transparent 12%),
    radial-gradient(circle at 16% 18%, rgba(255,255,255,0.12), transparent 10%),
    radial-gradient(circle at 84% 16%, rgba(255,255,255,0.10), transparent 10%),
    linear-gradient(180deg, rgba(255,255,255,0.12), transparent 18%);
  pointer-events:none;
  z-index:0;
  mix-blend-mode:screen;
  animation:surfaceShimmer 12s ease-in-out infinite;
}

body::after{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 50% 100%, rgba(0,0,0,0.28), transparent 34%),
    linear-gradient(180deg, transparent 0%, rgba(2,12,24,0.10) 34%, rgba(0,5,10,0.58) 100%);
  pointer-events:none;
  z-index:1;
}

@keyframes surfaceShimmer{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(8px);}
}

.ocean{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
  z-index:1;
}

.ocean::before{
  content:"";
  position:absolute;
  inset:-10%;
  background:
    linear-gradient(120deg, transparent 35%, rgba(255,255,255,0.24) 47%, transparent 57%),
    linear-gradient(135deg, transparent 42%, rgba(120,245,255,0.16) 50%, transparent 60%);
  opacity:0.72;
  transform:rotate(-2deg);
  animation:causticDrift 14s linear infinite;
}

.ocean::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 50% 14%, rgba(220,252,255,0.16), transparent 18%),
    radial-gradient(circle at 30% 28%, rgba(255,255,255,0.08), transparent 14%),
    radial-gradient(circle at 70% 30%, rgba(255,255,255,0.08), transparent 14%);
  opacity:0.9;
}

@keyframes causticDrift{
  0%{transform:translateX(-4%) translateY(0) rotate(-2deg);}
  50%{transform:translateX(4%) translateY(6px) rotate(-2deg);}
  100%{transform:translateX(-4%) translateY(0) rotate(-2deg);}
}

.depth-layer{
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 50% 18%, rgba(255,255,255,0.14), transparent 18%),
    radial-gradient(circle at 50% 90%, rgba(0,0,0,0.12), transparent 26%);
  filter:blur(1px);
}

.mist{
  position:absolute;
  inset:-5%;
  background:
    radial-gradient(circle at 50% 40%, rgba(170,245,255,0.12), transparent 26%),
    radial-gradient(circle at 50% 60%, rgba(255,255,255,0.05), transparent 22%);
  opacity:0.8;
  animation:mistMove 16s ease-in-out infinite;
}

@keyframes mistMove{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(12px);}
}

.fish,.seaweed,.coral,.tile,.cursor,.cursor-ring,.spark,.logo,.section{
  will-change:transform;
}

.fish{
  position:absolute;
  width:112px;
  height:52px;
  border-radius:50% 50% 42% 42%;
  background:linear-gradient(135deg, rgba(255,255,255,0.98), rgba(125,240,255,0.92) 34%, rgba(22,156,220,0.98) 100%);
  box-shadow:0 0 18px rgba(120,220,255,0.18);
  filter:drop-shadow(0 0 14px rgba(0,190,255,0.28));
  opacity:0.98;
}

.fish::before{
  content:"";
  position:absolute;
  right:-20px;
  top:50%;
  width:26px;
  height:28px;
  transform:translateY(-50%) rotate(16deg);
  border-radius:52% 20% 52% 20%;
  background:linear-gradient(135deg, rgba(10,72,114,0.98), rgba(210,250,255,0.95));
}

.fish::after{
  content:"";
  position:absolute;
  right:24%;
  top:25%;
  width:9px;
  height:9px;
  border-radius:50%;
  background:rgba(255,255,255,0.98);
  box-shadow:0 0 10px rgba(255,255,255,0.55);
}

.f1{ top:18%; left:-20%; animation:swimR 24s linear infinite; }
.f2{ top:34%; left:110%; transform:scale(0.78) rotateY(180deg); animation:swimL 28s linear infinite; opacity:0.8; }
.f3{ top:58%; left:-22%; transform:scale(0.66); animation:swimR 30s ease-in-out infinite; opacity:0.72; }
.f4{ top:70%; left:114%; transform:scale(0.56) rotateY(180deg); animation:swimL 34s linear infinite; opacity:0.64; }

@keyframes swimR{
  0%{transform:translateX(0) translateY(0) scale(1);}
  25%{transform:translateX(38vw) translateY(-8px) scale(1.03);}
  50%{transform:translateX(78vw) translateY(6px) scale(1.05);}
  75%{transform:translateX(118vw) translateY(-4px) scale(1.03);}
  100%{transform:translateX(160vw) translateY(0) scale(1);}
}

@keyframes swimL{
  0%{transform:translateX(0) translateY(0) scale(0.78) rotateY(180deg);}
  25%{transform:translateX(-36vw) translateY(8px) scale(0.8) rotateY(180deg);}
  50%{transform:translateX(-76vw) translateY(-6px) scale(0.82) rotateY(180deg);}
  75%{transform:translateX(-118vw) translateY(4px) scale(0.8) rotateY(180deg);}
  100%{transform:translateX(-160vw) translateY(0) scale(0.78) rotateY(180deg);}
}

.seaweed{
  position:absolute;
  bottom:0;
  width:14px;
  border-radius:20px;
  background:linear-gradient(180deg, #29f2c7 0%, #057fa7 100%);
  filter:drop-shadow(0 0 10px rgba(0,190,255,0.2));
  animation:sway 5s ease-in-out infinite alternate;
  opacity:0.98;
}

.seaweed::before{
  content:"";
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:88%;
  width:20px;
  height:26px;
  border-radius:50%;
  background:linear-gradient(180deg, rgba(230,255,250,0.95), rgba(36,165,195,0.48));
}

.sw1{ left:4%; height:176px; }
.sw2{ left:10%; height:210px; animation-delay:0.3s; }
.sw3{ right:10%; height:160px; animation-delay:0.2s; }
.sw4{ right:4%; height:178px; animation-delay:0.4s; }
.sw5{ left:20%; height:124px; width:11px; opacity:0.9; animation-delay:0.15s; }
.sw6{ right:20%; height:130px; width:11px; opacity:0.9; animation-delay:0.35s; }

@keyframes sway{
  0%{transform:translateX(0) skewX(0deg);}
  100%{transform:translateX(12px) skewX(7deg);}
}

.coral{
  position:absolute;
  bottom:0;
  width:22px;
  height:58px;
  border-radius:18px 18px 24px 24px;
  background:linear-gradient(180deg, #ffcf6a 0%, #ff5ca8 100%);
  filter:drop-shadow(0 0 14px rgba(255,120,180,0.25));
}

.coral::before{
  content:"";
  position:absolute;
  left:50%;
  bottom:70%;
  width:18px;
  height:22px;
  border-radius:999px;
  transform:translateX(-50%);
  background:linear-gradient(180deg, #fff6c9 0%, #ff5ca8 100%);
}

.c1{ left:7%; }
.c2{ right:7%; height:48px; }
.c3{ left:19%; width:18px; height:42px; opacity:0.9; }
.c4{ right:19%; width:18px; height:42px; opacity:0.9; }

.logo{
  position:fixed;
  top:14px;
  left:14px;
  z-index:10000;
  text-decoration:none;
}

.logo img{
  width:84px;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  filter:drop-shadow(0 0 14px rgba(0,190,255,0.42));
}

.cursor{
  position:fixed;
  width:14px;
  height:14px;
  border-radius:50%;
  background:rgba(220,255,255,0.98);
  box-shadow:0 0 12px rgba(220,255,255,0.95), 0 0 28px rgba(0,190,255,0.42);
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:99999;
}

.cursor-ring{
  position:fixed;
  width:42px;
  height:42px;
  border-radius:50%;
  border:2px solid rgba(210,250,255,0.5);
  pointer-events:none;
  transform:translate(-50%,-50%);
  z-index:99998;
  transition:0.08s ease;
}

.spark{
  position:fixed;
  width:7px;
  height:7px;
  border-radius:50%;
  background:rgba(235,255,255,0.98);
  box-shadow:0 0 12px rgba(220,255,255,0.95), 0 0 24px rgba(0,200,255,0.42);
  pointer-events:none;
  z-index:99997;
  animation:sparkFly 0.7s linear forwards;
}

@keyframes sparkFly{
  0%{opacity:1; transform:scale(1);}
  100%{opacity:0; transform:translateY(-24px) scale(0.2);}
}

.cursor.hover{
  transform:translate(-50%,-50%) scale(1.6);
}

.cursor-ring.hover{
  transform:translate(-50%,-50%) scale(1.25);
  border-color:rgba(210,250,255,0.9);
}

#intro{
  position:relative;
  min-height:100vh;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  padding:120px 20px 48px;
  overflow:hidden;
  z-index:2;
  background:
    linear-gradient(180deg, rgba(18,92,142,0.56) 0%, rgba(8,56,96,0.76) 62%, rgba(3,10,16,0.95) 100%);
}

#intro::before{
  content:"";
  position:absolute;
  inset:-8%;
  background:
    radial-gradient(circle at 50% 0%, rgba(255,255,255,0.28), transparent 25%),
    radial-gradient(circle at 50% 18%, rgba(120,225,255,0.16), transparent 18%);
  opacity:0.95;
  animation:heroDrift 16s ease-in-out infinite;
}

#intro::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.10), transparent 10%),
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.08), transparent 12%),
    radial-gradient(circle at 80% 18%, rgba(255,255,255,0.07), transparent 10%);
  pointer-events:none;
}

@keyframes heroDrift{
  0%,100%{transform:translateX(0);}
  50%{transform:translateX(18px);}
}

.tile{
  position:absolute;
  width:124px;
  height:124px;
  border-radius:50%;
  background:
    radial-gradient(circle at 35% 32%, rgba(255,255,255,1), rgba(255,255,255,0.34) 22%, rgba(255,255,255,0.08) 48%, rgba(255,255,255,0.03) 72%, transparent 75%),
    radial-gradient(circle at 50% 50%, rgba(100,220,255,0.28), transparent 58%);
  border:1px solid rgba(220,255,255,0.22);
  box-shadow:
    0 0 24px rgba(0,185,255,0.18),
    inset 0 0 16px rgba(255,255,255,0.12);
  backdrop-filter:blur(10px);
  animation:float 9s ease-in-out infinite;
}

.t1{top:10%; left:13%; width:108px; height:108px;}
.t2{top:16%; right:12%; width:92px; height:92px;}
.t3{bottom:14%; left:12%; width:96px; height:96px;}
.t4{bottom:18%; right:18%; width:108px; height:108px;}
.t5{top:52%; left:6%; width:84px; height:84px;}
.t6{top:60%; right:6%; width:80px; height:80px;}

@keyframes float{
  0%,100%{transform:translateY(0) rotate(0deg);}
  50%{transform:translateY(-16px) rotate(4deg);}
}

#sub{
  z-index:3;
  text-align:center;
  color:#eefcff;
  font-size:clamp(0.85rem,2.7vw,1.05rem);
  letter-spacing:clamp(1px,0.5vw,3px);
  margin-bottom:22px;
  opacity:0;
  animation:fadeIn 1s ease forwards;
  text-shadow:0 0 14px rgba(120,225,255,0.28);
}

@keyframes fadeIn{
  to{opacity:1;}
}

#title{
  display:flex;
  gap:8px;
  flex-wrap:nowrap;
  justify-content:center;
  align-items:center;
  white-space:nowrap;
  z-index:3;
  max-width:100%;
  padding:16px 18px;
  border-radius:26px;
  background:linear-gradient(180deg, rgba(8,42,74,0.72), rgba(8,30,56,0.56));
  border:1px solid rgba(180,245,255,0.22);
  box-shadow:0 0 30px rgba(0,155,220,0.24);
  backdrop-filter:blur(12px);
}

.letter{
  font-size:clamp(1.3rem,5vw,3.9rem);
  color:#f9feff;
  opacity:0;
  transform:translateY(54px) rotateX(-90deg);
  animation:drop3D 0.8s ease forwards;
  text-shadow:
    0 0 18px rgba(0,225,255,0.42),
    0 0 40px rgba(0,140,210,0.22);
}

@keyframes drop3D{
  0%{opacity:0; transform:translateY(54px) rotateX(-90deg);}
  60%{opacity:1; transform:translateY(-8px) rotateX(12deg);}
  100%{opacity:1; transform:translateY(0) rotateX(0deg);}
}

#visitBtn{
  margin-top:34px;
  padding:14px 30px;
  font-size:clamp(0.9rem,2.8vw,1rem);
  letter-spacing:2px;
  color:#effcff;
  background:linear-gradient(180deg, rgba(44,181,245,0.98), rgba(6,98,160,0.96));
  border:1px solid rgba(220,255,255,0.42);
  border-radius:14px;
  cursor:pointer;
  backdrop-filter:blur(10px);
  box-shadow:
    0 0 24px rgba(0,180,255,0.28),
    inset 0 0 18px rgba(255,255,255,0.08);
  transition:0.25s ease;
  z-index:3;
}

#visitBtn:hover{
  transform:scale(1.05);
  background:linear-gradient(180deg, rgba(56,205,255,1), rgba(10,120,190,1));
  box-shadow:0 0 32px rgba(0,200,255,0.40), 0 0 42px rgba(0,120,200,0.22);
}

@media (max-width: 768px){
  body{ cursor:auto; }
  .cursor,.cursor-ring,.spark{ display:none; }
  .logo img{ width:62px; }
  #intro{ padding:98px 14px 30px; }
  .tile{ width:86px; height:86px; }
  .t1{top:8%; left:6%; width:78px; height:78px;}
  .t2{top:14%; right:6%; width:68px; height:68px;}
  .t3{bottom:10%; left:6%; width:70px; height:70px;}
  .t4{bottom:14%; right:6%; width:78px; height:78px;}
  .t5{top:52%; left:2%; width:64px; height:64px;}
  .t6{top:58%; right:2%; width:60px; height:60px;}
  #title{ padding:10px 12px; gap:5px; }
  .letter{ font-size:clamp(1.05rem,4.4vw,2.2rem); }
  #visitBtn{ margin-top:28px; padding:12px 22px; }
}

@media (max-width: 480px){
  .logo{ top:8px; left:8px; }
  .logo img{ width:52px; }
  #intro{ padding:86px 12px 26px; }
  .tile{ width:68px; height:68px; }
  #sub{ margin-bottom:14px; }
  #title{ gap:3px; padding:8px 10px; }
  .letter{ font-size:clamp(0.92rem,4vw,1.65rem); }
  #visitBtn{ padding:10px 18px; letter-spacing:1px; }
}
</style>
</head>
<body>

<a href="#" class="logo">
  <img src="logo.png" alt="Aura Developers Logo">
</a>

<div class="cursor"></div>
<div class="cursor-ring"></div>

<div class="ocean">
  <div class="depth-layer"></div>
  <div class="mist"></div>
  <div class="fish f1"></div>
  <div class="fish f2"></div>
  <div class="fish f3"></div>
  <div class="fish f4"></div>
  <div class="seaweed sw1"></div>
  <div class="seaweed sw2"></div>
  <div class="seaweed sw3"></div>
  <div class="seaweed sw4"></div>
  <div class="seaweed sw5"></div>
  <div class="seaweed sw6"></div>
  <div class="coral c1"></div>
  <div class="coral c2"></div>
  <div class="coral c3"></div>
  <div class="coral c4"></div>
</div>

<div id="intro">
  <div class="tile t1"></div>
  <div class="tile t2"></div>
  <div class="tile t3"></div>
  <div class="tile t4"></div>
  <div class="tile t5"></div>
  <div class="tile t6"></div>

  <div id="sub">LET'S EXPLORE TOGETHER</div>
  <div id="title"></div>
  <button id="visitBtn" onclick="goVisit()">VISIT SITE</button>
</div>

<script>
const text = "AURA DEVELOPERS";
const title = document.getElementById("title");
let i = 0;

function build(){
  if(i < text.length){
    const span = document.createElement("span");
    span.className = "letter";
    span.textContent = text[i];
    title.appendChild(span);
    i++;
    setTimeout(build, 88);
  }
}
window.addEventListener("load", build);

function goVisit(){
  window.location.href = "home.html";
}

const cursor = document.querySelector(".cursor");
const ring = document.querySelector(".cursor-ring");
const isTouch = window.matchMedia("(max-width: 768px), (pointer: coarse)").matches;

if(!isTouch){
  document.addEventListener("mousemove",(e)=>{
    const x = e.clientX;
    const y = e.clientY;
    cursor.style.left = x + "px";
    cursor.style.top = y + "px";
    ring.style.left = x + "px";
    ring.style.top = y + "px";

    const spark = document.createElement("div");
    spark.className = "spark";
    spark.style.left = x + "px";
    spark.style.top = y + "px";
    document.body.appendChild(spark);
    setTimeout(()=>spark.remove(),700);
  });

  document.getElementById("visitBtn").addEventListener("mouseenter",()=>{
    cursor.classList.add("hover");
    ring.classList.add("hover");
  });

  document.getElementById("visitBtn").addEventListener("mouseleave",()=>{
    cursor.classList.remove("hover");
    ring.classList.remove("hover");
  });
}
</script>

</body>
</html>

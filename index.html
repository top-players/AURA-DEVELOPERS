<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Developers</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html, body{
    width:100%;
    height:100%;
}

body{
    font-family:'Orbitron', sans-serif;
    background:#000010;
    overflow:hidden;
    cursor:none;
    position:relative;
    color:#fff;
    -webkit-font-smoothing:antialiased;
}

/* LOGO */
.site-logo{
    position:fixed;
    top:12px;
    left:12px;
    z-index:10000;
    display:inline-block;
    text-decoration:none;
}

.site-logo img{
    width:84px;
    height:auto;
    object-fit:contain;
    background:transparent;
    opacity:0.9;
    filter:brightness(1.05) contrast(1.08) drop-shadow(0 0 6px rgba(0,229,255,0.2));
    transition:0.3s ease;
}

.site-logo img:hover{
    transform:scale(1.05);
    opacity:1;
}

/* CURSOR */
.cursor{
    position:fixed;
    width:12px;
    height:12px;
    border-radius:50%;
    background:#00e5ff;
    box-shadow:0 0 10px #00e5ff, 0 0 20px #8a2be2;
    pointer-events:none;
    transform:translate(-50%,-50%);
    z-index:99999;
}

.cursor-ring{
    position:fixed;
    width:40px;
    height:40px;
    border:2px solid rgba(0,229,255,0.4);
    border-radius:50%;
    pointer-events:none;
    transform:translate(-50%,-50%);
    z-index:99998;
    transition:0.08s ease;
}

.spark{
    position:fixed;
    width:6px;
    height:6px;
    border-radius:50%;
    background:#00e5ff;
    pointer-events:none;
    z-index:99997;
    box-shadow:0 0 10px #00e5ff, 0 0 20px #8a2be2;
    animation:sparkFly 0.6s linear forwards;
}

@keyframes sparkFly{
    0%{opacity:1; transform:scale(1);}
    100%{opacity:0; transform:translateY(-25px) scale(0);}
}

.cursor.hover{
    transform:translate(-50%,-50%) scale(1.5);
    background:#fff;
}

.cursor-ring.hover{
    transform:translate(-50%,-50%) scale(1.3);
    border-color:rgba(0,229,255,0.9);
}

/* BACKGROUND */
#intro{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    overflow:hidden;
    background:radial-gradient(circle at top, #12001f, #000010 60%);
}

#intro::before{
    content:"";
    position:absolute;
    inset:-50%;
    background:radial-gradient(circle, #8a2be233, transparent 60%);
    animation:glowMove 10s linear infinite;
    opacity:0.35;
}

@keyframes glowMove{
    0%{transform:translate(-20%,-20%);}
    50%{transform:translate(20%,20%);}
    100%{transform:translate(-20%,-20%);}
}

.tile{
    position:absolute;
    width:120px;
    height:120px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;
    overflow:hidden;
    backdrop-filter:blur(5px);
    -webkit-backdrop-filter:blur(5px);
    animation:float 7.5s ease-in-out infinite;
}

.tile::after{
    content:"010101010101010101010101010101010101";
    position:absolute;
    inset:0;
    font-size:9px;
    line-height:10px;
    padding:6px;
    color:#00e5ff;
    opacity:0.55;
    word-break:break-all;
    text-shadow:0 0 5px #00e5ff, 0 0 10px #8a2be2;
}

@keyframes float{
    0%{transform:translate3d(0,0,0) rotateX(0deg);}
    50%{transform:translate3d(0,-14px,0) rotateX(10deg);}
    100%{transform:translate3d(0,0,0) rotateX(0deg);}
}

.t1{top:10%; left:15%;}
.t2{top:20%; right:10%;}
.t3{bottom:15%; left:10%;}
.t4{bottom:20%; right:20%;}
.t5{top:50%; left:5%;}
.t6{top:60%; right:5%;}

/* TEXT */
#sub{
    color:#aaa;
    font-size:1rem;
    letter-spacing:4px;
    margin-bottom:20px;
    opacity:0;
    animation:fadeIn 1s ease forwards;
    z-index:2;
}

@keyframes fadeIn{
    to{opacity:1;}
}

#title{
    display:flex;
    gap:14px;
    perspective:900px;
    z-index:2;
    flex-wrap:wrap;
    justify-content:center;
}

.letter{
    font-size:clamp(2.5rem, 7vw, 4.5rem);
    color:#fff;
    opacity:0;
    transform:translateY(60px) rotateX(-90deg);
    animation:drop3D 0.85s ease forwards;
    text-shadow:0 0 10px #8a2be2, 0 0 25px #00e5ff, 0 0 40px #3b82f6;
}

@keyframes drop3D{
    0%{opacity:0; transform:translateY(60px) rotateX(-90deg);}
    60%{opacity:1; transform:translateY(-10px) rotateX(15deg);}
    100%{opacity:1; transform:translateY(0) rotateX(0deg);}
}

/* BUTTON */
#visitBtn{
    margin-top:30px;
    padding:12px 28px;
    font-size:1rem;
    letter-spacing:2px;
    color:#00e5ff;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(0,229,255,0.4);
    border-radius:10px;
    cursor:pointer;
    backdrop-filter:blur(6px);
    box-shadow:0 0 10px rgba(0,229,255,0.2), inset 0 0 10px rgba(138,43,226,0.2);
    transition:0.3s ease;
    z-index:3;
}

#visitBtn:hover{
    transform:scale(1.05);
    color:#fff;
    box-shadow:0 0 20px rgba(0,229,255,0.5), 0 0 30px rgba(138,43,226,0.4);
}
</style>
</head>

<body>

<a href="#" class="site-logo">
    <img src="logo.png" alt="Aura Developers Logo">
</a>

<div class="cursor"></div>
<div class="cursor-ring"></div>

<div id="intro">
    <div class="tile t1"></div>
    <div class="tile t2"></div>
    <div class="tile t3"></div>
    <div class="tile t4"></div>
    <div class="tile t5"></div>
    <div class="tile t6"></div>

    <div id="sub">LET'S EXPLORE TOGETHER</div>
    <div id="title"></div>

    <button id="visitBtn" onclick="goVisit()">VISIT SITE</button>
</div>

<script>
const text = "AURA DEVELOPER";
const title = document.getElementById("title");
let i = 0;

function build(){
    if(i < text.length){
        const span = document.createElement("span");
        span.className = "letter";
        span.textContent = text[i];
        title.appendChild(span);
        i++;
        setTimeout(build, 95);
    }
}

window.addEventListener("load", build);

function goVisit(){
    window.location.href = "home.html";
}

const cursor = document.querySelector(".cursor");
const ring = document.querySelector(".cursor-ring");

document.addEventListener("mousemove",(e)=>{
    const x = e.clientX;
    const y = e.clientY;

    cursor.style.left = x + "px";
    cursor.style.top = y + "px";
    ring.style.left = x + "px";
    ring.style.top = y + "px";

    const spark = document.createElement("div");
    spark.className = "spark";
    spark.style.left = x + "px";
    spark.style.top = y + "px";
    document.body.appendChild(spark);

    setTimeout(()=> spark.remove(), 600);
});

document.getElementById("visitBtn").addEventListener("mouseenter", () => {
    cursor.classList.add("hover");
    ring.classList.add("hover");
});

document.getElementById("visitBtn").addEventListener("mouseleave", () => {
    cursor.classList.remove("hover");
    ring.classList.remove("hover");
});
</script>

</body>
</html>
